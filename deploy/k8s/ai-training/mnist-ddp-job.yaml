apiVersion: v1
kind: Service
metadata:
  name: mnist-ddp
  namespace: default
spec:
  clusterIP: None
  selector:
    job-name: mnist-ddp
  ports:
    - name: rendezvous
      port: 29500
      targetPort: 29500
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mnist-ddp
  namespace: default
spec:
  completions: 2
  parallelism: 2
  completionMode: Indexed
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: mnist-ddp
    spec:
      restartPolicy: Never
      subdomain: mnist-ddp
      containers:
        - name: trainer
          image: swr.cn-north-4.myhuaweicloud.com/<YOUR_ORG>/mnist-ddp:v1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - >
              torchrun
              --nnodes=2
              --nproc_per_node=1
              --node_rank=${JOB_COMPLETION_INDEX}
              --master_addr=mnist-ddp-0.mnist-ddp.default.svc.cluster.local
              --master_port=29500
              train_ddp.py
              --epochs 2
              --batch-size 128
              --cpu
          ports:
            - containerPort: 29500
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
