apiVersion: v1
kind: ServiceAccount
metadata:
  name: yjs-prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: yjs-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: yjs-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yjs-prometheus
subjects:
  - kind: ServiceAccount
    name: yjs-prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yjs-prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: node-exporter
        static_configs:
          - targets:
              - node-exporter.monitoring.svc.cluster.local:9100

      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics-prom.monitoring.svc.cluster.local:80

      - job_name: kubelet-cadvisor
        scheme: https
        metrics_path: /metrics/cadvisor
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yjs-prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yjs-prometheus
  template:
    metadata:
      labels:
        app: yjs-prometheus
    spec:
      serviceAccountName: yjs-prometheus
      imagePullSecrets:
        - name: swr-secret
      containers:
        - name: prometheus
          image: swr.cn-north-4.myhuaweicloud.com/yjs-final/prometheus:v3.11.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: yjs-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: yjs-prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: yjs-prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
