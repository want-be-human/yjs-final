grafana:
  enabled: true
  adminPassword: "admin123456"
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer
  service:
    type: ClusterIP
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: yjs-final/grafana
    tag: "12.4.3"
  sidecar:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: yjs-final/k8s-sidecar
      tag: "2.6.0"

prometheus:
  enabled: false
  service:
    type: ClusterIP
  prometheusSpec:
    retention: 7d
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: yjs-final/prometheus
      tag: "v3.11.2"
  thanosService:
    enabled: false
  thanosServiceExternal:
    enabled: false

alertmanager:
  enabled: false
  alertmanagerSpec:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: yjs-final/alertmanager
      tag: "v0.32.0"

prometheusOperator:
  enabled: false
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: yjs-final/prometheus-operator
    tag: "v0.90.1"
  prometheusDefaultBaseImage: yjs-final/prometheus
  prometheusDefaultBaseImageRegistry: swr.cn-north-4.myhuaweicloud.com
  admissionWebhooks:
    patch:
      image:
        registry: swr.cn-north-4.myhuaweicloud.com
        repository: yjs-final/kube-webhook-certgen
        tag: "1.8.1"
  prometheusConfigReloader:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: yjs-final/prometheus-config-reloader
      tag: "v0.90.1"

kubeStateMetrics:
  enabled: false

kube-state-metrics:
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: yjs-final/kube-state-metrics
    tag: "v2.18.0"
  imagePullSecrets: []

prometheus-node-exporter:
  enabled: false
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: yjs-final/node-exporter
    tag: "v1.11.1"

global:
  imagePullSecrets:
    - name: swr-secret
