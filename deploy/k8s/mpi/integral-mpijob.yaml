apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: integral-mpi
  namespace: default
spec:
  slotsPerWorker: 2
  runPolicy:
    cleanPodPolicy: None
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          imagePullSecrets:
            - name: swr-secret
          containers:
            - name: launcher
              image: swr.cn-north-4.myhuaweicloud.com/yjs-final/mpi4py:latest
              command:
                - mpirun
                - -n
                - "4"
                - python
                - /opt/mpi/integral_mpi.py
                - --steps
                - "10000000"
              volumeMounts:
                - name: mpi-scripts
                  mountPath: /opt/mpi
          volumes:
            - name: mpi-scripts
              configMap:
                name: mpi-scripts
    Worker:
      replicas: 2
      template:
        spec:
          imagePullSecrets:
            - name: swr-secret
          containers:
            - name: worker
              image: swr.cn-north-4.myhuaweicloud.com/yjs-final/mpi4py:latest
              volumeMounts:
                - name: mpi-scripts
                  mountPath: /opt/mpi
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: mpi-scripts
              configMap:
                name: mpi-scripts
