services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.backend
    image: yjs-backend:v1
    pull_policy: build
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: cloudredis123
    ports:
      - "5000:5000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.frontend
    image: yjs-frontend:v1
    pull_policy: build
    ports:
      - "8080:80"
    depends_on:
      - backend

  redis:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    command: ["redis-server", "--requirepass", "cloudredis123", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
